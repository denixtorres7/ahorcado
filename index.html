<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Bomba de emociones</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#ECECEC;
font-family:Poppins,sans-serif;
overflow:hidden;
}

.game{

width:100vw;
height:100vh;

position:relative;

padding-top:20px;

}

/* PANEL */

.panel{

width:86%;

margin:auto;

background:#f3f3f3;

border-radius:30px;

padding:20px;

position:relative;

}

/* PISTA */

.pista{

width:85%;

margin:auto;

background:white;

padding:14px;

border-radius:25px;

font-size:22px;

font-weight:700;

text-align:center;

margin-bottom:35px;

}

/* CASILLAS */

.word-boxes{

display:flex;

justify-content:center;

gap:8px;

flex-wrap:wrap;

margin-top:20px;

margin-bottom:35px;

}

.card{

width:62px;
height:62px;

perspective:1000px;

}

.inner{

position:relative;

width:100%;
height:100%;

transform-style:preserve-3d;

transition:.6s;

}

.card.flip .inner{

transform:
rotateY(180deg);

}

.front,
.back{

position:absolute;

width:100%;
height:100%;

display:flex;

justify-content:center;
align-items:center;

border-radius:14px;

backface-visibility:hidden;

font-size:38px;

font-weight:700;

}

.front{

background:#ff40e7;

}

.back{

background:#ff40e7;

transform:
rotateY(180deg);

}

/* TECLADO */

.keyboard{

display:flex;

flex-wrap:wrap;

justify-content:flex-start;

gap:10px;

width:60%;

margin-left:40px;

}

.keyboard button{

width:58px;
height:58px;

border-radius:12px;

border:2px solid #555;

background:white;

font-size:30px;

font-family:Poppins;

font-weight:700;

cursor:pointer;

}

.used{

opacity:.35;

pointer-events:none;

}

/* PERSONAJE */

.character{

position:absolute;

right:50px;

/* más cerca */

bottom:-5px;

width:500px;

z-index:100;

pointer-events:none;

transition:
transform .5s,
filter .5s;

transform-origin:
bottom center;

}

/* errores suaves */

.state1{

transform:
rotate(-2deg);

animation:
s1 .8s infinite;

}

.state2{

transform:
rotate(-4deg)
scale(1.03);

animation:
s2 .7s infinite;

}

.state3{

transform:
rotate(-6deg)
scale(1.05);

animation:
s3 .6s infinite;

}

.state4{

transform:
rotate(8deg)
scale(.95);

animation:
s4 .5s infinite;

filter:
brightness(.7);

}

@keyframes s1{

0%{transform:translateX(0)}
50%{transform:translateX(-2px)}
100%{transform:translateX(2px)}

}

@keyframes s2{

0%{transform:translateX(0)}
50%{transform:translateX(-3px)}
100%{transform:translateX(3px)}

}

@keyframes s3{

0%{transform:translateX(0)}
50%{transform:translateX(-4px)}
100%{transform:translateX(4px)}

}

@keyframes s4{

0%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
100%{transform:translateX(-5px)}

}

</style>
</head>

<body>

<div class="game">

<div class="panel">

<div
class="pista"
id="pista">
Cargando...
</div>

<div
class="word-boxes"
id="boxes">
</div>

<div
class="keyboard"
id="keyboard">
</div>

<img
id="character"
class="character"
src="Saludo_cuerpo_completo.gif">

</div>

</div>

<script>

let currentWord="";
let revealed=[];
let errors=0;

let palabraAnterior=-1;

let data=[];

const saludoGif=
"Saludo_cuerpo_completo.gif";

const muertoGif=
"Muerto.gif";

const abc=[
"A","B","C","D","E","F","G",
"H","I","J","K","L","M",
"N","Ñ","O","P","Q","R",
"S","T","U","V","W","X",
"Y","Z"
];

fetch("palabras.csv")
.then(r=>r.text())
.then(csv=>{

let rows=
csv.split(/\r?\n/);

for(let i=1;i<rows.length;i++){

let c=
rows[i].split(",");

if(c.length>=2){

data.push({

palabra:c[0].trim(),

pista:
c.slice(1)
.join(",")

});

}

}

nuevaPalabra();

});

function nuevaPalabra(){

let n;

do{

n=
Math.floor(
Math.random()*
data.length
);

}

while(
n==palabraAnterior
&& data.length>1
);

palabraAnterior=n;

start(
data[n].palabra,
data[n].pista
);

}

function start(word,hint){

errors=0;

character.src=
saludoGif;

character.className=
"character";

currentWord=
word
.toUpperCase()
.substring(0,11);

revealed=
Array(
currentWord.length
)
.fill(false);

document
.getElementById(
"pista"
)
.innerHTML=
hint.replace(/"/g,'');

drawBoxes();

drawKeyboard();

}

function drawBoxes(){

boxes.innerHTML="";

currentWord
.split("")
.forEach((l,i)=>{

boxes.innerHTML+=`

<div
class="card"
data-index="${i}">

<div class="inner">

<div class="front">
</div>

<div class="back">

${l}

</div>

</div>

</div>

`;

});

}

function drawKeyboard(){

keyboard.innerHTML="";

abc.forEach(letter=>{

let b=
document.createElement(
"button"
);

b.innerHTML=
letter;

b.onclick=()=>{

check(letter);

b.classList.add(
"used"
);

};

keyboard.appendChild(b);

});

}

function check(letter){

let found=false;

currentWord
.split("")
.forEach((l,i)=>{

if(l==letter){

found=true;

revealed[i]=true;

document
.querySelector(
"[data-index='"+i+"']"
)
.classList.add(
"flip"
);

}

});

if(!found){

handleError();

}

checkWin();

}

function handleError(){

errors++;

character.className=
"character";

if(errors==1){

character.classList.add(
"state1"
);

}

if(errors==2){

character.src=
muertoGif;

character.classList.add(
"state2"
);

}

if(errors==3){

character.src=
muertoGif;

character.classList.add(
"state3"
);

}

if(errors==4){

character.src=
muertoGif;

character.classList.add(
"state4"
);

setTimeout(
nuevaPalabra,
1200
);

}

if(
navigator.vibrate
){

navigator.vibrate(
70
);

}

}

function checkWin(){

if(
revealed.every(
x=>x
)
){

setTimeout(
nuevaPalabra,
1000
);

}

}

</script>

</body>
</html>
