<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Bomba de emociones</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f3f3f3;
font-family:'Poppins',sans-serif;
overflow:hidden;
}

.game{

width:100vw;
height:100vh;
position:relative;

}

.pista{

width:70%;
margin:auto;

margin-top:30px;

background:white;

padding:15px;

border-radius:20px;

font-size:24px;

text-align:center;

}

.word-boxes{

display:flex;

justify-content:center;

gap:10px;

margin-top:50px;

}

.card{

width:60px;
height:60px;

perspective:1000px;

}

.inner{

position:relative;

width:100%;
height:100%;

transform-style:preserve-3d;

transition:.6s;

}

.card.flip .inner{

transform:
rotateY(180deg);

}

.front,
.back{

position:absolute;

width:100%;
height:100%;

display:flex;

align-items:center;
justify-content:center;

border-radius:12px;

backface-visibility:hidden;

font-family:Poppins;

font-weight:700;

font-size:38px;

text-transform:uppercase;

}

.front{

background:#ff40e7;

}

.back{

background:#ff40e7;

color:black;

transform:
rotateY(180deg);

}

.keyboard{

display:flex;

flex-wrap:wrap;

gap:8px;

width:900px;

justify-content:center;

margin:auto;

margin-top:60px;

}

.keyboard button{

width:52px;
height:52px;

font-size:28px;

font-family:Poppins;

background:white;

border:2px solid #444;

cursor:pointer;

border-radius:10px;

}

.used{

opacity:.35;

pointer-events:none;

}

.character{

position:absolute;

right:50px;

bottom:0;

width:330px;

transition:
transform .5s,
filter .5s;

}

/*ERROR 1*/

.state1{

transform:
rotate(-5deg)
scale(1.03);

animation:
shakeLight .5s infinite;

}

/*ERROR2*/

.state2{

transform:
rotate(-10deg)
scale(1.08);

filter:
contrast(1.2);

animation:
shakeMedium .4s infinite;

}

/*ERROR3*/

.state3{

transform:
rotate(-15deg)
scale(1.12);

filter:
brightness(.8);

animation:
shakeHard .25s infinite;

}

/*MUERTO*/

.state4{

transform:
rotate(20deg)
scale(.9);

filter:
brightness(.45);

animation:
shakeDeath .15s infinite;

}

@keyframes shakeLight{

0%{transform:translateX(0)}
50%{transform:translateX(-4px)}
100%{transform:translateX(4px)}

}

@keyframes shakeMedium{

0%{transform:translateX(0)}
25%{transform:translateX(-7px)}
50%{transform:translateX(7px)}
100%{transform:translateX(0)}

}

@keyframes shakeHard{

0%{transform:translateX(0)}
25%{transform:translateX(-10px)}
50%{transform:translateX(10px)}
100%{transform:translateX(0)}

}

@keyframes shakeDeath{

0%{transform:translateX(-14px)}
50%{transform:translateX(14px)}
100%{transform:translateX(-14px)}

}

</style>
</head>

<body>

<div class="game">

<div
class="pista"
id="pista">

Cargando...

</div>

<div
class="word-boxes"
id="boxes">

</div>

<div
class="keyboard"
id="keyboard">

</div>

<img
id="character"
class="character"
src="Saludo_cuerpo_completo.gif">

</div>

<script>

let currentWord="";
let revealed=[];
let errors=0;

const maxErrors=4;

const boxes=
document.getElementById(
"boxes"
);

const keyboard=
document.getElementById(
"keyboard"
);

const pista=
document.getElementById(
"pista"
);

const character=
document.getElementById(
"character"
);

const abc=[

"A","B","C","D","E","F","G",
"H","I","J","K","L","M",
"N","Ñ","O","P","Q","R",
"S","T","U","V","W","X",
"Y","Z"

];

fetch(
"palabras.csv"
)

.then(r=>r.text())

.then(csv=>{

let rows=
csv
.split("\n");

let data=[];

for(
let i=1;
i<rows.length;
i++
){

let c=
rows[i]
.split(",");

if(
c.length>=2
){

data.push({

palabra:
c[0],

pista:
c[1]

})

}

}

let random=
data[
Math.floor(
Math.random()
*
data.length
)
];

start(
random.palabra,
random.pista
);

});



function start(
word,
hint
){

errors=0;

currentWord=

word
.trim()
.toUpperCase()

.normalize(
"NFD"
)

.replace(
/[\u0300-\u036f]/g,
""
)

.substring(
0,
11
);

revealed=
Array(
currentWord.length
)
.fill(false);

pista.innerHTML=
hint;

drawBoxes();

drawKeyboard();

}



function drawBoxes(){

boxes.innerHTML="";

currentWord
.split("")
.forEach((l,i)=>{

boxes.innerHTML+=`

<div
class="card"
data-index="${i}">

<div
class="inner">

<div
class="front">
</div>

<div
class="back">

${l}

</div>

</div>

</div>

`;

});

}



function drawKeyboard(){

keyboard.innerHTML="";

abc.forEach(letter=>{

let b=
document.createElement(
"button"
);

b.innerText=
letter;

b.onclick=()=>{

check(
letter
);

b.classList.add(
"used"
);

};

keyboard.appendChild(
b
);

});

}



function check(letter){

let found=false;

currentWord
.split("")
.forEach((l,i)=>{

if(
l===letter
){

found=true;

revealed[i]=true;

document
.querySelector(
`.card[data-index='${i}']`
)

.classList.add(
"flip"
);

}

});

if(
!found
){

handleError();

}

checkWin();

}



function handleError(){

if(
errors>=4
)
return;

errors++;

vibrateError();

character.className=
"character";

switch(errors){

case 1:

character.src=
"Saludo_cuerpo_completo.gif";

character.classList.add(
"state1"
);

break;


case 2:

character.src=
"Muerto(1).gif";

character.classList.add(
"state2"
);

break;


case 3:

character.src=
"Muerto(1).gif";

character.classList.add(
"state3"
);

break;


case 4:

character.src=
"Muerto(1).gif";

character.classList.add(
"state4"
);

gameOver();

break;

}

}



function vibrateError(){

if(
!navigator.vibrate
)return;

switch(errors){

case 1:

navigator.vibrate(
100
);

break;

case 2:

navigator.vibrate(
[
100,
50,
100
]
);

break;

case 3:

navigator.vibrate(
[
150,
50,
150
]
);

break;

case 4:

navigator.vibrate(
[
300,
100,
300,
100,
500
]
);

break;

}

}



function gameOver(){

document
.querySelectorAll(
".keyboard button"
)

.forEach(btn=>{

btn.disabled=true;

});

setTimeout(()=>{

alert(
"GAME OVER"
);

},1200);

}



function checkWin(){

let complete=
revealed.every(
v=>v
);

if(
complete
){

setTimeout(()=>{

alert(
"¡GANASTE!"
);

},700);

}

}

</script>

</body>
</html>
